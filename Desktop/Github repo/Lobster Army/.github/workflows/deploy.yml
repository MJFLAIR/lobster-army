name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: lobster-army

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Hard Rules Check
        run: python scripts/check_hard_rules.py

      - name: Run Tests
        run: pytest tests/
        env:
          # Mock secrets for tests
          # We don't need real keys here as tests mock everything
          PYTHONPATH: .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker

      # Build & Deploy Gateway
      - name: Build and Deploy Gateway
        run: |
          docker build -t gcr.io/$PROJECT_ID/$REPO_NAME-gateway:${{ github.sha }} .
          docker push gcr.io/$PROJECT_ID/$REPO_NAME-gateway:${{ github.sha }}
          gcloud run deploy $REPO_NAME-gateway \
            --image gcr.io/$PROJECT_ID/$REPO_NAME-gateway:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SERVICE_ROLE=gateway"

      # Build & Deploy Runtime (Same verify, different entrypoint/env if needed)
      # Assuming same image, different command or env
      - name: Deploy Runtime
        run: |
          gcloud run deploy $REPO_NAME-runtime \
            --image gcr.io/$PROJECT_ID/$REPO_NAME-gateway:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars "SERVICE_ROLE=runtime" \
             --command "python" \
             --args "-m,runtime.app"
